<!DOCTYPE html>
<html lang="en">
<!--begin::Head-->
<head>
    <base href="/" />
    <title>{% block title %}{% endblock %} — {{ site_name }}</title>
    <meta charset="utf-8" />
    <meta name="description" content="{{ site_name }} — Admin Dashboard" />
    <meta name="author" content="Rendy Irawan" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta property="og:locale" content="id_ID" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{ site_name }} — Dashboard" />
    <meta property="og:url" content="{{ current_url }}" />
    <meta property="og:site_name" content="{{ site_name }}" />
    <link rel="canonical" href="{{ current_url }}" />
    <link rel="shortcut icon" href="/assets/media/logos/{{ site_logo }}" />
    <!--begin::Fonts-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family={{ site_font | replace(from=" ", to="+") }}:wght@300;400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <!--end::Fonts-->
    <!--begin::Vendor Stylesheets-->
    <link href="/assets/plugins/custom/fullcalendar/fullcalendar.bundle.css" rel="stylesheet" type="text/css" />
    <link href="/assets/plugins/custom/datatables/datatables.bundle.css" rel="stylesheet" type="text/css" />
    <!--end::Vendor Stylesheets-->
    <!--begin::Global Stylesheets Bundle(mandatory for all pages)-->
    <link href="/assets/plugins/global/plugins.bundle.css" rel="stylesheet" type="text/css" />
    <link href="/assets/css/style.bundle.css" rel="stylesheet" type="text/css" />
    <!--end::Global Stylesheets Bundle-->
    <style>
        :root {
            --bs-font-sans-serif: '{{ site_font }}', sans-serif;
            --bs-body-font-family: '{{ site_font }}', sans-serif;
        }
        body {
            font-family: '{{ site_font }}', sans-serif !important;
        }
        h1, h2, h3, h4, h5, h6, .h1, .h2, .h3, .h4, .h5, .h6 {
            font-family: '{{ site_font }}', sans-serif !important;
        }
        /* Sidebar overlay for mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 104;
        }
        .sidebar-overlay.active { display: block; }
        /* Custom sidebar styles for Demo 11 */
        #kt_app_sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 280px;
            z-index: 105;
            background: #fff;
            border-right: 1px solid var(--bs-gray-200);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
        }
        #kt_app_sidebar.active { transform: translateX(0); }
        [data-bs-theme="dark"] #kt_app_sidebar {
            background: #1e1e2d;
            border-right-color: rgba(255,255,255,0.07);
        }
        /* === WA Service brand override (hijau) — selaras shell custom === */
        :root {
            --bs-primary: #15a85b; --bs-primary-rgb: 21,168,91; --bs-primary-active: #0e8a4a;
            --bs-link-color: #15a85b; --bs-link-color-rgb: 21,168,91; --bs-link-hover-color: #0e8a4a;
            --kt-primary: #15a85b; --kt-primary-active: #0e8a4a; --kt-primary-light: #e7f8ee;
        }
        .btn.btn-primary { background-color:#15a85b !important; border-color:#15a85b !important;
            --bs-btn-bg:#15a85b; --bs-btn-border-color:#15a85b; --bs-btn-hover-bg:#0e8a4a;
            --bs-btn-hover-border-color:#0e8a4a; --bs-btn-active-bg:#0e8a4a; --bs-btn-active-border-color:#0e8a4a; }
        .btn.btn-light-primary { background-color:#e7f8ee !important; color:#15a85b !important; }
        .text-primary { color:#15a85b !important; }
        .bg-primary { background-color:#15a85b !important; }
        .bg-light-primary { background-color:#e7f8ee !important; }
        .badge-light-primary { background-color:#e7f8ee !important; color:#15a85b !important; }
        .text-hover-primary:hover { color:#15a85b !important; }
        .menu-active-bg .menu-item .menu-link.active { background-color:rgba(21,168,91,.10) !important; }
        #kt_app_sidebar .menu-link.active .menu-title,
        #kt_app_sidebar .menu-link.active .menu-icon i { color:#15a85b !important; }
        .menu-state-primary .menu-item .menu-link.active { color:#15a85b !important; }
        /* === Font Inter (selaras shell custom) === */
        body, .menu, .btn, .form-control, .form-select, h1,h2,h3,h4,h5,h6,.h1,.h2,.h3,.h4,.h5,.h6 { font-family: 'Inter', sans-serif !important; }
        /* === Sidebar gelap (selaras shell custom wa.html) === */
        #kt_app_sidebar { background:#15151f !important; border-right-color:rgba(255,255,255,.06) !important; }
        #kt_app_sidebar .separator { border-color:rgba(255,255,255,.07) !important; }
        #kt_app_sidebar h5, #kt_app_sidebar .text-gray-800, #kt_app_sidebar .fw-bold.text-gray-800 { color:#ffffff !important; }
        #kt_app_sidebar .text-muted { color:#5b5d72 !important; }
        #kt_app_sidebar .menu-heading { color:#5b5d72 !important; }
        #kt_app_sidebar .menu-title { color:#9a9cb0 !important; }
        #kt_app_sidebar .menu-icon i { color:#6e7088 !important; }
        #kt_app_sidebar .menu-link { border-radius:9px; }
        #kt_app_sidebar .menu-link:hover { background:#1e1e2b !important; }
        #kt_app_sidebar .menu-link:hover .menu-title { color:#e8e9f0 !important; }
        #kt_app_sidebar .menu-item.here > .menu-link, #kt_app_sidebar .menu-link.active { background:rgba(37,211,102,.12) !important; }
        #kt_app_sidebar .menu-link.active .menu-title { color:#ffffff !important; }
        #kt_app_sidebar .menu-link.active .menu-icon i { color:#25d366 !important; }
        #kt_app_sidebar .menu-sub .menu-link.active .menu-title { color:#25d366 !important; }
        #kt_app_sidebar .bullet { background-color:#6e7088 !important; }
        #kt_app_sidebar .menu-link.active .bullet { background-color:#25d366 !important; }
        #kt_app_sidebar .menu-arrow:after { color:#6e7088 !important; }
    </style>
    <script>
        if (window.top != window.self) { window.top.location.replace(window.self.location.href); }
    </script>
    {% block stylesheets %}{% endblock %}
</head>
<!--end::Head-->
<!--begin::Body-->
<body id="kt_body" class="header-fixed header-tablet-and-mobile-fixed toolbar-enabled">
    <!--begin::Theme mode setup on page load-->
    <script>
        var defaultThemeMode = "light";
        var themeMode;
        if (document.documentElement) {
            if (document.documentElement.hasAttribute("data-bs-theme-mode")) {
                themeMode = document.documentElement.getAttribute("data-bs-theme-mode");
            } else {
                if (localStorage.getItem("data-bs-theme") !== null) {
                    themeMode = localStorage.getItem("data-bs-theme");
                } else {
                    themeMode = defaultThemeMode;
                }
            }
            if (themeMode === "system") {
                themeMode = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
            }
            document.documentElement.setAttribute("data-bs-theme", themeMode);
        }
    </script>
    <!--end::Theme mode setup on page load-->
    <!--begin::Main-->
    <!--begin::Root-->
    <div class="d-flex flex-column flex-root">
        <!--begin::Page-->
        <div class="page d-flex flex-row flex-column-fluid">
            <!--begin::Wrapper-->
            <div class="wrapper d-flex flex-column flex-row-fluid" id="kt_wrapper">
                <!--begin::Header-->
                <div id="kt_header" class="header" data-kt-sticky="true" data-kt-sticky-name="header" data-kt-sticky-offset="{default: '200px', lg: '300px'}">
                    <!--begin::Container (Top Bar)-->
                    <div class="container-xxl d-flex flex-grow-1 flex-stack">
                        <!--begin::Header Logo-->
                        <div class="d-flex align-items-center me-5">
                            <!--begin::Sidebar toggle (mobile)-->
                            <div class="d-lg-none btn btn-icon btn-active-color-primary w-30px h-30px ms-n2 me-3" id="kt_app_sidebar_toggle">
                                <i class="ki-duotone ki-abstract-14 fs-2"><span class="path1"></span><span class="path2"></span></i>
                            </div>
                            <!--end::Sidebar toggle-->
                            <!--begin::Header menu toggle (mobile)-->
                            <div class="d-lg-none btn btn-icon btn-active-color-primary w-30px h-30px me-3" id="kt_header_menu_toggle">
                                <i class="ki-duotone ki-text-align-left fs-2"><span class="path1"></span><span class="path2"></span><span class="path3"></span><span class="path4"></span></i>
                            </div>
                            <!--end::Header menu toggle-->
                            <a href="/admin/dashboard">
                                <img alt="Logo" src="/assets/media/logos/{{ site_logo }}" class="theme-light-show h-20px h-lg-30px" />
                                <img alt="Logo" src="/assets/media/logos/{{ site_logo }}" class="theme-dark-show h-20px h-lg-30px" />
                            </a>
                        </div>
                        <!--end::Header Logo-->
                        <!--begin::Topbar-->
                        {% include "layout/navbar.html" %}
                        <!--end::Topbar-->
                    </div>
                    <!--end::Container-->
                    <!--begin::Separator-->
                    <div class="separator"></div>
                    <!--end::Separator-->
                    <!--begin::Container (Menu Bar)-->
                    <div class="header-menu-container container-xxl d-flex flex-stack h-lg-75px w-100" id="kt_header_nav">
                        <!--begin::Menu wrapper-->
                        {% include "layout/menu.html" %}
                        <!--end::Menu wrapper-->
                    </div>
                    <!--end::Container-->
                </div>
                <!--end::Header-->

                <!--begin::Container-->
                <div id="kt_content_container" class="d-flex flex-column-fluid align-items-start container-xxl">
                    <!--begin::Sidebar (Custom for Demo 11)-->
                    {% include "layout/sidebar.html" %}
                    <!--end::Sidebar-->
                    <!--begin::Content-->
                    <div class="content flex-row-fluid" id="kt_content">
                        {% block content %}{% endblock %}
                    </div>
                    <!--end::Content-->
                </div>
                <!--end::Container-->

                <!--begin::Footer-->
                {% include "layout/footer.html" %}
                <!--end::Footer-->
            </div>
            <!--end::Wrapper-->
        </div>
        <!--end::Page-->
    </div>
    <!--end::Root-->
    <!--end::Main-->

    <!--begin::Sidebar Overlay (mobile)-->
    <div class="sidebar-overlay" id="kt_sidebar_overlay"></div>

    <!--begin::Javascript-->
    <script>
        var hostUrl = "/assets/";
    </script>
    <script src="/assets/plugins/global/plugins.bundle.js"></script>
    <script src="/assets/js/scripts.bundle.js"></script>
    <script src="/assets/plugins/custom/fullcalendar/fullcalendar.bundle.js"></script>
    <script src="/assets/plugins/custom/datatables/datatables.bundle.js"></script>
    <script src="/assets/js/widgets.bundle.js"></script>
    <script src="/assets/js/custom/widgets.js"></script>
    <script src="/assets/js/custom/apps/chat/chat.js"></script>
    <script src="/assets/js/custom/utilities/modals/create-campaign.js"></script>
    <script src="/assets/js/custom/utilities/modals/users-search.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- Sidebar Toggle ---
            const sidebar = document.getElementById('kt_app_sidebar');
            const overlay = document.getElementById('kt_sidebar_overlay');
            const toggleBtns = document.querySelectorAll('#kt_app_sidebar_toggle, #kt_sidebar_toggle_desktop');

            toggleBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    sidebar.classList.toggle('active');
                    overlay.classList.toggle('active');
                });
            });
            if (overlay) {
                overlay.addEventListener('click', function() {
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                });
            }

            // --- Global Toastr ---
            toastr.options = {
                "closeButton": true,
                "progressBar": true,
                "positionClass": "toastr-top-right",
                "timeOut": "5000"
            };

            // --- Flash Messages ---
            {% if flash_success %}toastr.success("{{ flash_success }}");{% endif %}
            {% if flash_error %}toastr.error("{{ flash_error }}");{% endif %}
            {% if flash_warning %}toastr.warning("{{ flash_warning }}");{% endif %}
            {% if flash_info %}toastr.info("{{ flash_info }}");{% endif %}

            // --- Quick Search ---
            const searchPages = [
                { title: 'Dashboard', url: "/admin/dashboard", icon: 'ki-element-11', desc: 'Main dashboard overview' },
                { title: 'Settings', url: "/admin/settings", icon: 'ki-setting-2', desc: 'Application configuration' }
            ];
            const searchInput = document.querySelector('[data-kt-search-element="input"]');
            const resultsEl = document.querySelector('[data-kt-search-element="results"]');
            const mainEl = document.querySelector('[data-kt-search-element="main"]');
            const emptyEl = document.querySelector('[data-kt-search-element="empty"]');
            const resultsContainer = document.getElementById('kt_header_search_results');
            if(searchInput) {
                searchInput.addEventListener('input', function(e) {
                    const query = e.target.value.toLowerCase();
                    if(query.length > 1) {
                        mainEl.classList.add('d-none');
                        const filtered = searchPages.filter(p => p.title.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query));
                        if(filtered.length > 0) {
                            emptyEl.classList.add('d-none');
                            resultsEl.classList.remove('d-none');
                            let html = '';
                            filtered.forEach(p => {
                                html += `<a href="${p.url}" class="d-flex text-gray-900 text-hover-primary align-items-center mb-5"><div class="symbol symbol-40px me-4"><span class="symbol-label bg-light"><i class="ki-duotone ${p.icon} fs-2 text-primary"><span class="path1"></span><span class="path2"></span><span class="path3"></span><span class="path4"></span></i></span></div><div class="d-flex flex-column"><span class="fs-6 fw-bold">${p.title}</span><span class="fs-7 fw-semibold text-muted">${p.desc}</span></div></a>`;
                            });
                            resultsContainer.innerHTML = html;
                        } else {
                            resultsEl.classList.add('d-none');
                            emptyEl.classList.remove('d-none');
                        }
                    } else {
                        mainEl.classList.remove('d-none');
                        resultsEl.classList.add('d-none');
                        emptyEl.classList.add('d-none');
                    }
                });
            }
        });
    </script>
    <!--end::Javascript-->
    <script>
    // Realtime notifications (WebSocket) → toastr di semua halaman admin (shell Metronic)
    (function(){
      function connect(){
        try{
          var proto = location.protocol === 'https:' ? 'wss' : 'ws';
          var ws = new WebSocket(proto + '://' + location.host + '/admin/ws/notifications');
          ws.onmessage = function(ev){ try{ var n = JSON.parse(ev.data); if(n.kind === 'system') return; if(window.toastr){ toastr.info(n.body || '', n.title || 'Notifikasi'); } }catch(_){} };
          ws.onclose = function(){ setTimeout(connect, 5000); };
          ws.onerror = function(){ try{ ws.close(); }catch(_){} };
        }catch(_){}
      }
      if(window.WebSocket) connect();
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
<!--end::Body-->
</html>

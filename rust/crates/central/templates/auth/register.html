{% extends "auth/app.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="d-flex flex-column-fluid flex-lg-row-auto justify-content-center justify-content-lg-start p-12">
    <div class="bg-body d-flex flex-column flex-center rounded-4 w-md-600px p-10 shadow-lg">
        <div class="d-flex flex-center flex-column align-items-stretch h-lg-100 w-md-400px">
            <div class="d-flex flex-center flex-column flex-column-fluid mb-2">
                <img alt="Logo" class="h-40px h-lg-100px" src="/assets/media/logos/{{ site_logo }}" />
            </div>
            <div class="d-flex flex-center flex-column flex-column-fluid pb-15 pb-lg-20 my-5">
                <form class="form w-100" method="POST" action="/admin/register">
                    <input type="hidden" name="_token" value="{{ csrf_token }}">
                    <div class="text-center mb-8">
                        <h1 class="text-gray-900 fw-bolder mb-3">Buat Akun</h1>
                    </div>
                    {% if autherror %}
                    <div class="alert alert-danger">{{ autherror }}</div>
                    {% endif %}
                    <div class="fv-row mb-5">
                        <input type="text" placeholder="Nama Lengkap" name="name" autocomplete="off" class="form-control bg-transparent" />
                    </div>
                    <div class="fv-row mb-5">
                        <input type="email" placeholder="Email" name="email" autocomplete="off" class="form-control bg-transparent" />
                    </div>
                    <div class="fv-row mb-5">
                        <input type="password" placeholder="Password" name="password" autocomplete="off" class="form-control bg-transparent" />
                    </div>
                    <div class="fv-row mb-5">
                        <input type="password" placeholder="Konfirmasi Password" name="password_confirmation" autocomplete="off" class="form-control bg-transparent" />
                    </div>
                    <div class="d-grid mb-8">
                        <button type="submit" class="btn btn-primary">Daftar</button>
                    </div>
                    <div class="text-gray-500 text-center fw-semibold fs-6">
                        Sudah punya akun? <a href="/admin/login" class="link-primary">Masuk</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
